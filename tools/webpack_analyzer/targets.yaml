selectors:
  webpack_analyzer:
    desc: "Webpack Bundle 分析 — 对所有 HTTPEndpoint 做 JS bundle 提取"
    query: |
      MATCH (a:Asset {id: $asset_id})
      CALL (a) {
        MATCH (a)-[:HAS_DOMAIN]->(:Domain)-[:PARENT_OF*0..]->(:Domain)-[:RESOLVES_TO]->(:IP)-[:HAS_PORT]->(:Port)-[:EXPOSES]->(ep:HTTPEndpoint)
        RETURN ep
        UNION
        MATCH (a)-[:HAS_IP]->(:IP)-[:HAS_PORT]->(:Port)-[:EXPOSES]->(ep:HTTPEndpoint)
        RETURN ep
      }
      WITH DISTINCT ep
      WHERE NOT EXISTS { MATCH (sr:ScanRun) WHERE sr.tool = $tool AND sr.target = ep.url }
      RETURN ep.url AS url
    mapping:
      url: "{url}"
