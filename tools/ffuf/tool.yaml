desc: "Web Fuzz 多模式"
command: "{bin} -u {url}/FUZZ -w res/wordlists/common.txt -fc 403,404"
use_on:
  Endpoint:
    desc: "目录/路径 Fuzz"
    command: "{bin} -u {url}/FUZZ -w res/wordlists/common.txt -fc 403,404 -t 50"
    params:
      url: "{url}"
  IP:
    desc: "虚拟主机 Fuzz"
    command: "{bin} -u http://{ip} -H \"Host: FUZZ\" -w res/wordlists/common.txt -fc 403,404"
    params:
      ip: "{value}"
