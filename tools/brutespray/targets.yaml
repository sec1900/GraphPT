selectors:
  brutespray:
    desc: "弱口令检测 — SSH/FTP/RDP/MySQL/Redis/SMB 等服务端口"
    query: |
      MATCH (a:Asset {id: $asset_id})
      CALL (a) {
        MATCH (a)-[:HAS_ROOT]->(:RootDomain)-[:HAS_SUB]->(:Subdomain)-[:RESOLVES_TO]->(ip:IP)-[:HAS_PORT]->(p:Port)
        WHERE p.number IN [21, 22, 23, 25, 53, 110, 143, 389, 445, 636, 873, 993, 995, 1433, 1521, 2049, 3306, 3389, 5432, 5900, 5985, 5986, 6379, 9200, 11211, 27017]
        WITH ip.value + ':' + toString(p.number) AS target, ip.value AS host, p.number AS port
        WHERE NOT EXISTS { MATCH (sr:ScanRun) WHERE sr.tool = $tool AND sr.target = target }
        RETURN target, host, port
        UNION
        MATCH (a)-[:HAS_IP]->(ip:IP)-[:HAS_PORT]->(p:Port)
        WHERE p.number IN [21, 22, 23, 25, 53, 110, 143, 389, 445, 636, 873, 993, 995, 1433, 1521, 2049, 3306, 3389, 5432, 5900, 5985, 5986, 6379, 9200, 11211, 27017]
        WITH ip.value + ':' + toString(p.number) AS target, ip.value AS host, p.number AS port
        WHERE NOT EXISTS { MATCH (sr:ScanRun) WHERE sr.tool = $tool AND sr.target = target }
        RETURN target, host, port
      }
      RETURN DISTINCT target AS target_url, host AS parent_ip, port AS number
    mapping:
      target_url: '{target_url}'
      parent_ip: '{parent_ip}'
      number: '{number}'
    transform:
      target_url: infer_service_from_port