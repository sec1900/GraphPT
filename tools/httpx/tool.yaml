desc: "Web 指纹探测"
command: "{bin} -l {urls_file} -json -timeout 10 -retries 1 -rate-limit 10 -title -status-code -tech-detect -content-length -silent -nc"
use_on:
  Subdomain:
    desc: "探测子域名是否有 Web 服务"
    params:
      urls_file: "{value}"
  IP:
    desc: "探测 IP 是否有 Web 服务"
    params:
      urls_file: "{value}"
  standalone_ip:
    desc: "探测独立 IP 是否有 Web 服务"
    params:
      urls_file: "{value}"
  Port:
    desc: "探测 IP:Port 是否有 Web 服务"
    params:
      urls_file: "{parent_ip}:{number}"
