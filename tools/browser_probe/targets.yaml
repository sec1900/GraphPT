selectors:
  browser_probe:
    desc: "浏览器探测 — 对首页/主要端点做 JS 渲染发现"
    query: |
      MATCH (a:Asset {id: $asset_id})
      CALL (a, a) {
        MATCH (a)-[:HAS_ROOT]->(:RootDomain)-[:HAS_SUB]->(:Subdomain)-[:RESOLVES_TO]->(:IP)-[:HAS_PORT]->(:Port)-[:EXPOSES]->(ep:HTTPEndpoint)
        RETURN ep
        UNION
        MATCH (a)-[:HAS_IP]->(:IP)-[:HAS_PORT]->(:Port)-[:EXPOSES]->(ep:HTTPEndpoint)
        RETURN ep
        UNION
        MATCH (a)-[:HAS_ROOT]->(:RootDomain)-[:HAS_SUB]->(:Subdomain)-[:EXPOSES]->(ep:HTTPEndpoint)
        RETURN ep
      }
      WITH DISTINCT ep
      WHERE ep.status_code = 200
        AND ep.crawl_status IN ['success', 'not_fetched']
        AND NOT EXISTS { MATCH (sr:ScanRun) WHERE sr.tool = $tool AND sr.target = ep.url }
      RETURN ep.url AS url
      LIMIT 20
    mapping:
      url: '{url}'