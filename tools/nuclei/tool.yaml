desc: "漏洞扫描 — res/nuclei-templates/ + res/poc/ 全量模板"
command: "{bin} -list {urls_file} -jsonl -silent -rate-limit 5 -timeout 10 -retries 2 -t res/nuclei-templates/ -t res/poc/"
use_on:
  Endpoint:
    desc: "对 Endpoint 执行漏洞扫描"
    params:
      urls_file: "{urls_file}"
    command: "{bin} -list {urls_file} -jsonl -silent -rate-limit 5 -timeout 10 -retries 2 -t res/nuclei-templates/ -t res/poc/"
  Subdomain:
    desc: "对 Subdomain 执行子域名接管检测"
    params:
      urls_file: "{urls_file}"
    command: "{bin} -list {urls_file} -jsonl -silent -timeout 10 -retries 1 -t http/takeovers/ -t dns/ -t res/nuclei-templates/ -t res/poc/"
