selectors:
  nuclei:
    desc: 漏洞扫描 — 全量端点批量盲扫
    query: |
      MATCH (a:Asset {id: $asset_id})
      CALL (a, a) {
        MATCH (a)-[:HAS_ROOT]->(:RootDomain)-[:HAS_SUB]->(:Subdomain)-[:RESOLVES_TO]->(:IP)-[:HAS_PORT]->(:Port)-[:EXPOSES]->(ep:HTTPEndpoint)
        RETURN ep
        UNION
        MATCH (a)-[:HAS_IP]->(:IP)-[:HAS_PORT]->(:Port)-[:EXPOSES]->(ep:HTTPEndpoint)
        RETURN ep
        UNION
        MATCH (a)-[:HAS_ROOT]->(:RootDomain)-[:HAS_SUB]->(:Subdomain)-[:EXPOSES]->(ep:HTTPEndpoint)
        RETURN ep
      }
      WITH DISTINCT ep
      WHERE ep.status_code > 0
        AND ep.content_type IS NOT NULL AND ep.content_type <> ''
        AND NOT EXISTS { MATCH (sr:ScanRun) WHERE sr.tool = $tool AND sr.target = ep.url }
      RETURN ep.url AS url
    mapping:
      url: "{urls_file}"
  nuclei:takeover:
    desc: "子域名接管检测 — 对所有子域名扫描 takeover 模板"
    query: |
      MATCH (a:Asset {id: $asset_id})-[:HAS_ROOT]->(:RootDomain)-[:HAS_SUB]->(sub:Subdomain)
      WHERE NOT EXISTS { MATCH (sr:ScanRun) WHERE sr.tool = 'nuclei:takeover' AND sr.target = sub.value }
      RETURN DISTINCT 'http://' + sub.value AS url, 'https://' + sub.value AS url_tls
      LIMIT 500
    mapping:
      url: "{urls_file}"
