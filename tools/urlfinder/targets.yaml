selectors:
  urlfinder:
    desc: 被动URL收集(Wayback等) — 取未扫过的根域名
    query: 'MATCH (a:Asset {id: $asset_id})-[:HAS_ROOT]->(rd:RootDomain)

      WHERE NOT EXISTS { MATCH (sr:ScanRun) WHERE sr.tool = $tool AND sr.target =
      rd.value }

      RETURN rd.value AS domain'
    mapping:
      domain: '{targets_file}'
