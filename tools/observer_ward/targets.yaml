selectors:
  observer_ward:
    desc: Web指纹识别 — 取未指纹识别的HTTPEndpoint（排除内网），批量一次跑完
    query: |
      MATCH (a:Asset {id: $asset_id})
      CALL (a, a) {
        MATCH (a)-[:HAS_ROOT]->(:RootDomain)-[:HAS_SUB]->(:Subdomain)-[:RESOLVES_TO]->(ip:IP)-[:HAS_PORT]->(:Port)-[:EXPOSES]->(ep:HTTPEndpoint)
        WHERE NOT ip.value STARTS WITH '127.' AND NOT ip.value STARTS WITH '10.' AND NOT ip.value STARTS WITH '192.168.'
        RETURN ep
        UNION
        MATCH (a)-[:HAS_IP]->(ip:IP)-[:HAS_PORT]->(:Port)-[:EXPOSES]->(ep:HTTPEndpoint)
        WHERE NOT ip.value STARTS WITH '127.' AND NOT ip.value STARTS WITH '10.' AND NOT ip.value STARTS WITH '192.168.'
        RETURN ep
        UNION
        MATCH (a)-[:HAS_ROOT]->(:RootDomain)-[:HAS_SUB]->(:Subdomain)-[:EXPOSES]->(ep:HTTPEndpoint)
        RETURN ep
      }
      WITH DISTINCT ep
      WHERE ep.status_code > 0
        AND ep.content_type IS NOT NULL AND ep.content_type <> ''
        AND NOT EXISTS { MATCH (sr:ScanRun) WHERE sr.tool = $tool AND sr.target = ep.url }
      RETURN ep.url AS url
    mapping:
      url: "{urls_file}"
