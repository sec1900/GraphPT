selectors:
  oob:
    desc: "需要 OOB 验证的漏洞 — SSRF/XXE/RCE/盲SQLi"
    query: |
      MATCH (a:Asset {id: $asset_id})
      CALL (a) {
        MATCH (a)-[:HAS_ROOT]->(:RootDomain)-[:HAS_SUB]->(:Subdomain)-[:RESOLVES_TO]->(:IP)-[:HAS_PORT]->(:Port)-[:EXPOSES]->(ep:HTTPEndpoint)-[:MAY_BE_VULNERABLE_TO]->(v:Vulnerability)
        RETURN v, ep.url AS endpoint_url
        UNION
        MATCH (a)-[:HAS_IP]->(:IP)-[:HAS_PORT]->(:Port)-[:EXPOSES]->(ep:HTTPEndpoint)-[:MAY_BE_VULNERABLE_TO]->(v:Vulnerability)
        RETURN v, ep.url AS endpoint_url
      }
      WITH DISTINCT v, endpoint_url
      WHERE v.type IN ['ssrf', 'xxe', 'rce', 'blind-sqli', 'blind-sql', 'sqli']
        AND NOT EXISTS { MATCH (sr:ScanRun) WHERE sr.tool = $tool AND sr.target = v.id }
      RETURN v.id AS target_id, v.title AS title, v.type AS type, endpoint_url
    mapping:
      target_id: "{target_id}"
