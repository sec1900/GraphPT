pipelines:
  company_recon:
    description: 公司→域名→子域名→DNS→端口→服务→指纹→爬虫/目录→指纹精扫→403绕过
    stages:
    - name: company_to_root_domain
      tools:
      - enscan
    - name: root_domain_to_subdomain
      tools:
      - subfinder
    - name: subdomain_to_ip
      tools:
      - dnsx
    - name: ip_to_port
      tools:
      - naabu
    - name: port_analysis
      tools:
      - nmap
      - httpx
    - name: web_crawl_brute
      tools:
      - katana
      - ffuf
      - gobuster
    - name: web_fingerprint
      tools:
      - observer_ward
    - name: vuln_scan
      tools:
      - nuclei
    - name: access_bypass
      tools:
      - 403bypass

  port_discovery:
    description: 快速全端口发现 → 针对性服务识别 → Web 指纹收集
    stages:
    - name: ip_to_port
      tools:
      - naabu
    - name: port_analysis
      tools:
      - nmap
      - httpx

  quick_scan:
    description: 端口发现 + 服务识别 + 指纹
    stages:
    - name: ip_to_port
      tools:
      - naabu
    - name: port_analysis
      tools:
      - nmap
      - httpx

  web_deep:
    description: 端口扫描 → 指纹 → 并行爬虫+目录爆破 → 403绕过
    stages:
    - name: ip_to_port
      tools:
      - naabu
    - name: port_analysis
      tools:
      - nmap
      - httpx
    - name: endpoint_analysis
      tools:
      - katana
      - ffuf
    - name: access_bypass
      tools:
      - 403bypass

  demo_chain:
    description: subfinder→httpx→nuclei（验证自定义流水线）
    stages:
    - name: subdomain_discovery
      tools:
      - subfinder
    - name: web_fingerprint
      tools:
      - httpx
    - name: vuln_scan
      tools:
      - nuclei

  test_nmap_chain:
    description: 单阶段 nmap（验证用）
    stages:
    - name: port_to_service
      tools:
      - nmap
