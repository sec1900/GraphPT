version: "3.9"

# ============================================================
# GraphPT — 红队Agent系统
# 采集引擎(Worker) + 认知引擎(Agent) + Neo4j + Redis
# 全部 Docker Compose 单机部署
# ============================================================

services:

  # ==========================================
  # Neo4j 图数据库 — 采集与认知的唯一共享存储
  # ==========================================
  neo4j:
    image: neo4j:5-community
    container_name: graphpt-neo4j
    ports:
      - "7474:7474"   # HTTP / Neo4j Browser
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-graphpt123}
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=2g
      - NEO4J_server_memory_pagecache_size=1g
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER:-neo4j}", "-p", "${NEO4J_PASSWORD:-graphpt123}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - graphpt-net
    restart: unless-stopped

  # ==========================================
  # Redis — Celery 消息队列 + 结果后端
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: graphpt-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - graphpt-net
    restart: unless-stopped

  # ==========================================
  # Celery Worker — 采集任务执行
  # 可横向扩展: docker compose up --scale celery-worker=4
  # ==========================================
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: graphpt-worker:latest
    container_name: graphpt-worker
    command: >
      celery -A graphpt.collector.app worker
      --loglevel=info
      --concurrency=${CELERY_CONCURRENCY:-4}
      --max-tasks-per-child=50
      --time-limit=3600
      --soft-time-limit=3300
    volumes:
      - ./data:/app/data
      - ./res:/app/res:ro
      - ./collector_data:/app/collector_data
      - ./graphpt/collector/collector.yaml:/app/graphpt/collector/collector.yaml:ro
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-graphpt123}
      - GRAPHPT_COLLECTOR_CONCURRENCY=${CELERY_CONCURRENCY:-4}
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - graphpt-net
    restart: unless-stopped

  # ==========================================
  # Celery Beat — 定时任务调度
  # ==========================================
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: graphpt-worker:latest
    container_name: graphpt-beat
    command: >
      celery -A graphpt.collector.app beat
      --loglevel=info
    volumes:
      - ./data:/app/data
      - ./res:/app/res:ro
      - ./graphpt/collector/collector.yaml:/app/graphpt/collector/collector.yaml:ro
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-graphpt123}
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - graphpt-net
    restart: unless-stopped

  # ==========================================
  # Flower — 采集任务监控面板 (http://localhost:5555)
  # ==========================================
  flower:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: graphpt-worker:latest
    container_name: graphpt-flower
    command: celery -A graphpt.collector.app flower --port=5555
    ports:
      - "5555:5555"
    volumes:
      - ./graphpt/collector/collector.yaml:/app/graphpt/collector/collector.yaml:ro
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - graphpt-net
    restart: unless-stopped

  # ==========================================
  # Agent — 认知引擎（7×24 持久运行）
  # 尚未实现，profiles: [agent] 使其不随默认 up -d 启动
  # 就绪后: docker compose --profile agent up -d
  # ==========================================
  agent:
    profiles:
      - agent
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: graphpt-worker:latest
    container_name: graphpt-agent
    command: >
      python -m graphpt.cli agent run
      --asset-id ${GRAPHPT_ASSET_ID:-default}
      --model ${GRAPHPT_AI_MODEL:-deepseek-v4-pro}
    stdin_open: true
    tty: true
    volumes:
      - ./data:/app/data
      - ./res:/app/res:ro
      - ./workspace:/app/workspace
      - ./.env:/app/.env:ro
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-graphpt123}
      - GRAPHPT_AI_BASE_URL=${GRAPHPT_AI_BASE_URL}
      - GRAPHPT_AI_MODEL=${GRAPHPT_AI_MODEL:-deepseek-v4-pro}
      - GRAPHPT_AI_API_KEY=${GRAPHPT_AI_API_KEY}
      - GRAPHPT_AI_WIRE_API=${GRAPHPT_AI_WIRE_API:-chat_completions}
      - GRAPHPT_AI_MAX_TOKENS=${GRAPHPT_AI_MAX_TOKENS:-65536}
      - GRAPHPT_REASONING_MODE=${GRAPHPT_REASONING_MODE:-enabled}
      - GRAPHPT_REASONING_EFFORT=${GRAPHPT_REASONING_EFFORT:-xhigh}
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - graphpt-net
    restart: unless-stopped

# ============================================================
# 卷
# ============================================================
volumes:
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  neo4j_plugins:
    driver: local
  redis_data:
    driver: local

# ============================================================
# 网络
# ============================================================
networks:
  graphpt-net:
    driver: bridge
