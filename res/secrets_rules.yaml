categories:
  框架组件识别:
  - name: Vite DevMode 开发模式暴露
    regex: (?i)(/@vite/client|vite\.config\.[jt]s|__vite_\w+)
    severity: high
  - name: Apache Shiro 识别
    regex: (?i)(=deleteMe|rememberMe=)
    severity: high
  - name: Struts2 识别
    regex: (?i)(GET|POST|https?://)[^\s]*\.(do|action)(?:\?|\.|$|[^a-zA-Z])
    severity: medium
  - name: Java 反序列化特征 (ViewState)
    regex: (?i)\b(javax\.faces\.ViewState)\b
    severity: medium
  - name: UEditor 识别
    regex: (?i)(ueditor\.(?:config|all)\.js)
    severity: medium
  - name: KindEditor 识别
    regex: (?i)(kindeditor\-(?:all\-min|all)\.js)
    severity: medium
  - name: SOAP/XML 请求
    regex: (?is)(<\?xml[\s\S]*<soap:Body>|<\?xml[\s\S]*>)
    severity: medium
  - name: JSON 数据交换
    regex: (?is)^\{[^}]*\}$
    severity: info
  凭据泄露:
  - name: AWS AccessKey 泄露
    regex: (?i)\b((AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16})\b
    severity: critical
  - name: AWS SecretKey 泄露
    regex: (?i)(?:aws|AWS)[_\s]*(?:secret|secretkey)[_\s]*(?:key)?[=:]\s*[\"']?([A-Za-z0-9/+=]{40,})[\"']?
    severity: critical
  - name: 阿里云 AccessKey 泄露
    regex: (?i)((?:access[_\-\s]?(?:key|secret)[_\-\s]?(?:id|secret)?)[\s=:]+[\"']?[A-Za-z0-9+/=]{16,}[\"']?)|\b(LTAI[A-Za-z0-9]{12,20})\b
    severity: critical
  - name: 腾讯云 SecretId 泄露
    regex: (?i)\b(AKID[A-Za-z0-9]{32,})\b
    severity: critical
  - name: Azure 存储账户密钥泄露
    regex: (?i)(DefaultEndpointsProtocol=https;AccountName=[^;]+;AccountKey=[^;]+)
    severity: critical
  - name: Google API Key 泄露
    regex: (?i)\b(AIza[0-9A-Za-z\-_]{35})\b
    severity: high
  - name: GitHub Personal Access Token 泄露
    regex: (?i)\b((?:ghp|gho|ghu|ghs|ghr)_[A-Za-z0-9_]{36,})\b
    severity: critical
  - name: SonarQube Token 泄露
    regex: (?i)(sonar[^\s]{0,50}(?:[\"'`])?[0-9a-f]{40}(?:[\"'`])?)
    severity: high
  - name: Google OAuth Access Token 泄露
    regex: (?i)\b(ya29\.[0-9A-Za-z_\-]+)\b
    severity: high
  - name: 通用 API Key/Secret 泄露
    regex: (?i)((?:access|admin|api|debug|auth|authorization|gpg|ops|ray|deploy|s3|certificate|aws|app|application|docker|es|elastic|elasticsearch|secret)[_\-]{0,5}(?:key|token|secret|secretkey|pass|password|sid|debug))|(?:secret|password)(?:[\"']?\s*:\s*|\s*=\s*)
    severity: high
  - name: 源代码中密码硬编码
    regex: (?i)(?:password|passwd|pwd|mima)[\"']?\s*[=:]\s*[\"'`]([^\"'`\s]{4,50})[\"'`]
    severity: high
  - name: HTTP 明文密码传输
    regex: (?i)((?:password)|(?:pass)|(?:secret)|(?:mima))['\"]?\s*[\\:\\\\=]
    severity: medium
  - name: 私钥文件泄露
    regex: '-----BEGIN (?:RSA|EC|DSA|OPENSSH|ENCRYPTED) PRIVATE KEY-----'
    severity: critical
  - name: 公钥传输
    regex: (BEGIN PUBLIC KEY)[\s\S]*?(END PUBLIC KEY)
    severity: info
  - name: 数据库连接字符串泄露
    regex: (?i)(?:jdbc:mysql|jdbc:postgresql|jdbc:oracle|jdbc:sqlserver|jdbc:mariadb|mongodb://|mysql://|postgres://|postgresql://|redis://|sqlserver://|oracle://)[^\"'<>\s]{10,}
    severity: critical
  - name: 用户名泄露
    regex: ([\"'])?[u](?:ser|name|ame|sername)([\"'])?\s*[:=]\s*[\"'][^\"'\s]{2,30}[\"']
    severity: medium
  - name: 企业微信凭据泄露
    regex: (?i)\b(?:corpid|corpsecret)\b
    severity: high
  - name: 微信小程序/公众号 AppID 泄露
    regex: (?i)\b(wx[0-9a-f]{16})\b
    severity: low
  - name: 支付宝 AppID 泄露
    regex: (?i)(?:alipay|支付宝)[_\s]*(?:app|应用)[_\s]*id\s*[=:]\s*[\"']?\d{16,}[\"']?
    severity: medium
  - name: Microsoft Teams Webhook 泄露
    regex: (?i)(https://outlook\.office\.com/webhook/[a-z0-9@\-]+/IncomingWebhook/[a-z0-9\-]+/[a-z0-9\-]+)
    severity: high
  - name: Zoho Webhook 泄露
    regex: (?i)(https://creator\.zoho\.com/api/[A-Za-z0-9/\-_\.]+\?authtoken=[A-Za-z0-9]+)
    severity: medium
  - name: Slack Token 泄露
    regex: (?i)\b(xox[abpsr]-[0-9a-zA-Z\-]{10,48})\b
    severity: high
  - name: Discord Webhook 泄露
    regex: (?i)(https://(?:discord\.com|discordapp\.com)/api/webhooks/\d{17,20}/[A-Za-z0-9_\-]{60,68})
    severity: high
  - name: GitLab Token 泄露
    regex: (?i)\b(glpat|gldt|glft|glsoat|glrt|glrct)-[A-Za-z0-9_\-]{20,50}\b
    severity: critical
  - name: CI/CD 凭据文件泄露
    regex: (?i)(\.gitlab-ci\.yml|Jenkinsfile|credentials\.xml|\.github/workflows/|\.travis\.yml|\.circleci/config\.yml|\.drone\.yml|azure-pipelines\.yml|bitbucket-pipelines\.yml)
